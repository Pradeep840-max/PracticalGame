<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Dragon Cursor</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0a0a0f, #000000 70%);
    cursor:none;
}

/* Stars Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation: stars 60s linear infinite;
    opacity:0.4;
}
@keyframes stars{
    from{transform:translate(0,0);}
    to{transform:translate(-1000px,-1000px);}
}

/* Dragon Container */
.dragon{
    position:absolute;
    width:120px;
    height:120px;
    pointer-events:none;
    transform: translate(-50%, -50%);
    transition: transform 0.05s linear;
}

/* Dragon Image */
.dragon img{
    width:100%;
    filter: drop-shadow(0 0 20px #ff0000);
    animation: wings 0.6s infinite alternate;
}

/* Wing Animation */
@keyframes wings{
    from{transform: scale(1);}
    to{transform: scale(1.05);}
}

/* Fire Tail */
.fire{
    position:absolute;
    width:40px;
    height:40px;
    background: radial-gradient(circle, orange, red, transparent);
    border-radius:50%;
    filter: blur(10px);
    animation: flame 0.2s infinite alternate;
}
@keyframes flame{
    from{transform: scale(1);}
    to{transform: scale(1.3);}
}
</style>
</head>

<body>

<div class="dragon" id="dragon">
    <img src="https://i.ibb.co/Qf3cFjG/dragon.png" alt="dragon">
    <div class="fire"></div>
</div>

</body>

</html>
